<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCBot — Pannello</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080b10;--surface:#0d1117;--surface2:#161b22;--surface3:#21262d;
      --border:#30363d;--accent:#00d4ff;--accent2:#00ff88;
      --danger:#ff4444;--warn:#ffaa00;--text:#e6edf3;
      --text-muted:#8b949e;--text-dim:#484f58;
      --font-ui:'Rajdhani',sans-serif;--font-mono:'JetBrains Mono',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    body::after{content:'';position:fixed;top:-40%;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(ellipse,rgba(0,212,255,.07) 0%,transparent 65%);pointer-events:none;}

    header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;border-bottom:1px solid var(--border);background:rgba(8,11,16,.95);}
    .logo{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;}
    .logo-icon{width:32px;height:32px;background:var(--accent);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
    .logo span{color:var(--accent);}
    .status-badge{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;color:var(--text-muted);}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);}
    .dot.online{background:var(--accent2);box-shadow:0 0 8px var(--accent2);animation:blink 2s infinite;}
    .dot.connecting{background:var(--warn);animation:blink .6s infinite;}
    .dot.offline{background:var(--danger);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
    .btn-dash{font-family:var(--font-ui);font-weight:600;font-size:14px;letter-spacing:1px;text-decoration:none;color:var(--accent);border:1px solid var(--accent);padding:6px 18px;border-radius:6px;transition:all .2s;text-transform:uppercase;}
    .btn-dash:hover{background:var(--accent);color:var(--bg);}
    .btn-dash.off{opacity:.35;pointer-events:none;}

    main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:36px;}
    .hero{text-align:center;}
    .hero h1{font-size:46px;font-weight:700;letter-spacing:6px;text-transform:uppercase;margin-bottom:10px;}
    .hero h1 em{font-style:normal;color:var(--accent);text-shadow:0 0 30px rgba(0,212,255,.5);}
    .hero p{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;}

    .panels{display:grid;grid-template-columns:350px 350px;gap:20px;width:100%;max-width:740px;}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .panel-header{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2);}
    .panel-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);}
    .panel-body{padding:14px;}

    .card{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;background:var(--surface2);margin-bottom:7px;position:relative;}
    .card:hover{border-color:var(--accent);background:rgba(0,212,255,.05);}
    .card.sel-acc{border-color:var(--accent);background:rgba(0,212,255,.08);}
    .card.sel-srv{border-color:var(--accent2);background:rgba(0,255,136,.08);}
    .card.sel-acc::after{content:'✓';position:absolute;right:13px;color:var(--accent);font-size:15px;font-weight:700;}
    .card.sel-srv::after{content:'✓';position:absolute;right:13px;color:var(--accent2);font-size:15px;font-weight:700;}
    .avatar{width:38px;height:38px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0;}
    .card-name{font-size:14px;font-weight:600;}
    .card-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
    .srv-icon{width:38px;height:38px;background:var(--surface3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
    .ver-tag{font-family:var(--font-mono);font-size:9px;color:var(--accent2);border:1px solid rgba(0,255,136,.3);padding:2px 5px;border-radius:3px;margin-left:auto;flex-shrink:0;}
    .btn-add{width:100%;padding:9px;border:1px dashed var(--border);border-radius:6px;background:transparent;color:var(--text-muted);font-family:var(--font-ui);font-size:13px;cursor:pointer;transition:all .15s;letter-spacing:1px;margin-top:2px;}
    .btn-add:hover{border-color:var(--accent);color:var(--accent);}

    /* CONNECT AREA */
    .connect-area{max-width:740px;width:100%;display:flex;flex-direction:column;align-items:center;gap:12px;}
    .btn-connect{width:100%;max-width:380px;padding:17px 32px;font-family:var(--font-ui);font-size:20px;font-weight:700;letter-spacing:4px;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,var(--accent),#0088aa);color:var(--bg);transition:all .2s;}
    .btn-connect:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,.35);}
    .btn-connect:disabled{background:var(--surface3);color:var(--text-dim);cursor:not-allowed;transform:none;box-shadow:none;}
    .btn-connect.disc{background:linear-gradient(135deg,var(--danger),#aa0000);}
    .connect-note{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:1px;text-align:center;}
    /* Progress bar under button */
    .connect-progress{width:100%;max-width:380px;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;display:none;}
    .connect-progress.show{display:block;}
    .connect-progress-bar{height:100%;background:var(--accent);width:0%;transition:width .4s;border-radius:2px;}

    /* LOG BOX */
    .log-box{width:100%;max-width:740px;background:var(--surface);border:1px solid var(--border);border-radius:8px;max-height:140px;overflow-y:auto;display:none;}
    .log-box.show{display:block;}
    .log-line{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid rgba(48,54,61,.4);font-family:var(--font-mono);font-size:11px;}
    .log-line:last-child{border-bottom:none;}
    .log-ts{color:var(--text-dim);font-size:10px;flex-shrink:0;}
    .log-lvl{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;}
    .lvl-info{background:rgba(0,212,255,.1);color:var(--accent);}
    .lvl-success{background:rgba(0,255,136,.1);color:var(--accent2);}
    .lvl-warn{background:rgba(255,170,0,.1);color:var(--warn);}
    .lvl-danger,.lvl-error{background:rgba(255,68,68,.1);color:var(--danger);}
    .log-msg{color:var(--text);}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:26px;width:400px;max-width:92vw;}
    .modal h2{font-size:17px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;color:var(--accent);}
    .fg{margin-bottom:13px;}
    .fg label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
    .fg input,.fg select{width:100%;padding:8px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-mono);font-size:12px;outline:none;transition:border-color .15s;}
    .fg input:focus,.fg select:focus{border-color:var(--accent);}
    .fg select option{background:var(--surface2);}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .modal-btns{display:flex;gap:10px;margin-top:18px;}
    .btn-p,.btn-g{flex:1;padding:9px;font-family:var(--font-ui);font-weight:600;font-size:13px;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:5px;cursor:pointer;transition:all .15s;}
    .btn-p{background:var(--accent);color:var(--bg);}
    .btn-g{background:var(--surface3);color:var(--text-muted);}
    .btn-g:hover{color:var(--text);}

    .toast{position:fixed;bottom:22px;right:22px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:5px;padding:11px 16px;font-family:var(--font-mono);font-size:12px;z-index:200;transform:translateX(130%);transition:transform .3s;}
    .toast.show{transform:translateX(0);}
    .toast.danger{border-left-color:var(--danger);}
    .toast.success{border-left-color:var(--accent2);}
    .toast.warn{border-left-color:var(--warn);}
    ::-webkit-scrollbar{width:3px;height:3px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  </style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon"></div>MC<span>BOT</span></div>
  <div class="status-badge"><div class="dot" id="hDot"></div><span id="hStatus">OFFLINE</span></div>
  <a href="/dashboard" class="btn-dash off" id="btnDash">Dashboard →</a>
</header>

<main>
  <div class="hero">
    <h1>Seleziona <em>Account</em></h1>
    <p>// Pannello di controllo bot Minecraft v2.0</p>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-header"><span>👤</span><span class="panel-title">Account</span></div>
      <div class="panel-body"><div id="accList"></div><button class="btn-add" onclick="openModal('account')">+ Aggiungi Account</button></div>
    </div>
    <div class="panel">
      <div class="panel-header"><span>🖥</span><span class="panel-title">Server</span></div>
      <div class="panel-body"><div id="srvList"></div><button class="btn-add" onclick="openModal('server')">+ Aggiungi Server</button></div>
    </div>
  </div>

  <div class="connect-area">
    <button class="btn-connect" id="btnConn" disabled onclick="handleConnect()">CONNETTI</button>
    <div class="connect-progress" id="progBar"><div class="connect-progress-bar" id="progFill"></div></div>
    <div class="connect-note" id="connNote">// Seleziona account e server per continuare</div>
  </div>

  <!-- Log box visibile durante la connessione -->
  <div class="log-box" id="logBox"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="mTitle">Aggiungi</h2>
    <div id="accForm">
      <div class="fg"><label>Username</label><input type="text" id="accUser" placeholder="NomeGiocatore"></div>
      <div class="fg"><label>Autenticazione</label>
        <select id="accAuth" onchange="togglePwField()">
          <option value="microsoft">Microsoft (Premium)</option>
          <option value="offline">Offline (Cracked)</option>
        </select>
      </div>
      <div class="fg" id="pwField" style="display:none"><label>Password /login (server cracked)</label><input type="password" id="accPw" placeholder="password"></div>
      <div class="fg"><label>Nome visualizzato</label><input type="text" id="accLabel" placeholder="Account Principale"></div>
    </div>
    <div id="srvForm" style="display:none">
      <div class="fg"><label>Host / IP</label><input type="text" id="srvHost" placeholder="play.server.it"></div>
      <div class="frow">
        <div class="fg"><label>Porta</label><input type="number" id="srvPort" value="25565"></div>
        <div class="fg"><label>Versione MC</label><input type="text" id="srvVer" value="1.21.8"></div>
      </div>
      <div class="fg"><label>Nome server</label><input type="text" id="srvLabel" placeholder="Server Principale"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-g" onclick="closeModal()">Annulla</button>
      <button class="btn-p" onclick="saveModal()">Salva</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io({ reconnection: true });
let cfg = { accounts: [], servers: [] };
let sel = { accountId: null, serverId: null };
let botState = 'offline';
let connecting = false;
let stateHandler = null;

// ── SOCKET ────────────────────────────────────────────────────────
socket.on('connect', () => { console.log('[socket] connesso'); });

socket.on('config:data', (data) => {
  cfg = data;
  render();
  if (cfg.accounts.length === 1) selAcc(cfg.accounts[0].id);
  if (cfg.servers.length === 1) selSrv(cfg.servers[0].id);
});

socket.on('bot:state', ({ state }) => {
  botState = state;
  updateUI(state);

  if (connecting && state === 'online') {
    connecting = false;
    setProgress(100);
    addLog('success', 'Connesso! Apertura dashboard...');
    setTimeout(() => { window.location.href = '/dashboard'; }, 800);
  } else if (connecting && state === 'offline') {
    connecting = false;
    setProgress(0);
    addLog('danger', 'Connessione fallita');
    document.getElementById('btnConn').disabled = false;
  }
});

socket.on('system:log', (entry) => {
  addLog(entry.level, entry.msg);
  // Se riceviamo SUCCESS durante la connessione, avanza la progress
  if (connecting && entry.level === 'success') setProgress(80);
  if (connecting && entry.level === 'info' && entry.msg.includes('Registry')) setProgress(30);
  if (connecting && entry.msg.includes('Connessione a')) setProgress(15);
});

// ── RENDER ────────────────────────────────────────────────────────
function render() { renderAccounts(); renderServers(); }

function renderAccounts() {
  document.getElementById('accList').innerHTML = cfg.accounts.map(a => `
    <div class="card ${sel.accountId===a.id?'sel-acc':''}" onclick="selAcc('${a.id}')">
      <div class="avatar" style="background:${a.color||'#00d4ff'}22;color:${a.color||'#00d4ff'}">${a.avatar||a.username[0].toUpperCase()}</div>
      <div><div class="card-name">${a.label||a.username}</div><div class="card-sub">${a.auth==='microsoft'?'🔒 Microsoft':'🔓 Offline'} · ${a.username}</div></div>
    </div>`).join('');
}

function renderServers() {
  document.getElementById('srvList').innerHTML = cfg.servers.map(s => `
    <div class="card ${sel.serverId===s.id?'sel-srv':''}" onclick="selSrv('${s.id}')">
      <div class="srv-icon">⚡</div>
      <div style="flex:1;min-width:0"><div class="card-name">${s.label}</div><div class="card-sub">${s.host}:${s.port||25565}</div></div>
      <div class="ver-tag">${s.version}</div>
    </div>`).join('');
}

function selAcc(id) { sel.accountId = id; renderAccounts(); updateBtn(); }
function selSrv(id) { sel.serverId = id; renderServers(); updateBtn(); }

function updateBtn() {
  const btn = document.getElementById('btnConn');
  const note = document.getElementById('connNote');
  if (botState === 'online') {
    btn.disabled = false; btn.textContent = 'DISCONNETTI'; btn.className = 'btn-connect disc';
    note.textContent = '// Bot connesso';
    return;
  }
  if (botState === 'connecting' || botState === 'reconnecting') {
    btn.disabled = true; btn.textContent = 'CONNESSIONE...'; btn.className = 'btn-connect';
    note.textContent = `// ${botState}...`;
    return;
  }
  btn.className = 'btn-connect';
  btn.disabled = !(sel.accountId && sel.serverId);
  btn.textContent = 'CONNETTI';
  if (!sel.accountId && !sel.serverId) note.textContent = '// Seleziona account e server';
  else if (!sel.accountId) note.textContent = '// Seleziona un account';
  else if (!sel.serverId) note.textContent = '// Seleziona un server';
  else { const s = cfg.servers.find(x => x.id === sel.serverId); note.textContent = `// Pronto → ${s?.host||''}`; }
}

function updateUI(state) {
  const dot = document.getElementById('hDot');
  const txt = document.getElementById('hStatus');
  const dash = document.getElementById('btnDash');
  dot.className = 'dot '+(state==='online'?'online':state==='connecting'||state==='reconnecting'?'connecting':'offline');
  txt.textContent = state.toUpperCase();
  dash.className = state==='online'?'btn-dash':'btn-dash off';
  updateBtn();
}

// ── CONNECT ───────────────────────────────────────────────────────
function handleConnect() {
  if (botState === 'online') {
    socket.emit('bot:disconnect');
    toast('Disconnessione...', 'warn');
    document.getElementById('logBox').classList.remove('show');
    return;
  }
  if (!sel.accountId || !sel.serverId) return;

  connecting = true;
  document.getElementById('btnConn').disabled = true;
  document.getElementById('logBox').classList.add('show');
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('progBar').classList.add('show');
  setProgress(5);

  socket.emit('bot:connect', { accountId: sel.accountId, serverId: sel.serverId });
  addLog('info', 'Connessione avviata...');

  // Safety timeout: se dopo 45s non siamo online, sblocca il pulsante
  setTimeout(() => {
    if (connecting) {
      connecting = false;
      setProgress(0);
      document.getElementById('btnConn').disabled = false;
      addLog('warn', 'Timeout connessione — riprova');
    }
  }, 45000);
}

function setProgress(pct) {
  document.getElementById('progFill').style.width = pct + '%';
  if (pct >= 100) setTimeout(() => { document.getElementById('progBar').classList.remove('show'); }, 600);
}

function addLog(level, msg) {
  const box = document.getElementById('logBox');
  const ts = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const div = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = `<span class="log-ts">${ts}</span><span class="log-lvl lvl-${level||'info'}">${(level||'info').toUpperCase()}</span><span class="log-msg">${msg}</span>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(mode) {
  document.getElementById('modal').classList.add('open');
  document.getElementById('mTitle').textContent = mode==='account'?'Aggiungi Account':'Aggiungi Server';
  document.getElementById('accForm').style.display = mode==='account'?'block':'none';
  document.getElementById('srvForm').style.display = mode==='server'?'block':'none';
  window._mmode = mode;
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function togglePwField() {
  document.getElementById('pwField').style.display = document.getElementById('accAuth').value==='offline'?'block':'none';
}

async function saveModal() {
  const res = await fetch('/api/config');
  const c = await res.json();
  if (window._mmode === 'account') {
    const u = document.getElementById('accUser').value.trim();
    const auth = document.getElementById('accAuth').value;
    const pw = document.getElementById('accPw').value.trim();
    const label = document.getElementById('accLabel').value.trim() || u;
    if (!u) return toast('Username obbligatorio','danger');
    const colors = ['#00d4ff','#00ff88','#ff6b35','#a855f7','#f59e0b'];
    const acc = { id:'acc_'+Date.now(), label, username:u, auth, color:colors[c.accounts.length%5], avatar:u[0].toUpperCase() };
    if (pw) acc.loginPassword = pw;
    c.accounts.push(acc);
  } else {
    const host = document.getElementById('srvHost').value.trim();
    const port = parseInt(document.getElementById('srvPort').value)||25565;
    const version = document.getElementById('srvVer').value.trim()||'1.21.8';
    const label = document.getElementById('srvLabel').value.trim()||host;
    if (!host) return toast('Host obbligatorio','danger');
    c.servers.push({ id:'srv_'+Date.now(), label, host, port, version, brand:'vanilla' });
  }
  await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)});
  cfg = c; render(); closeModal(); toast('Salvato!','success');
}

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

document.getElementById('modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
</script>
</body>
</html>
